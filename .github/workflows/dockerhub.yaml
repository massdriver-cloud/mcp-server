name: Push image to DockerHub

on:
  push:
    tags:
      - '*'

jobs:
  build_and_push:
    name: Build and push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_ACCESS_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: massdrivercloud/mcp-server
          tags: |
            type=semver,pattern={{version}}

      - name: Build and push
        id: docker-build
        uses: docker/build-push-action@v6
        with:
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          build-args: |
            VERSION=${{ steps.meta.outputs.version }}
          cache-from: type=gha,scope=mcp-image
          cache-to: type=gha,scope=mcp-image,mode=max

  publish_mcp_registry:
    name: Publish to the MCP Registry
    runs-on: ubuntu-latest
    needs: build_and_push
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install mcp-publisher
        run: |
          curl -fsSL "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_linux_amd64.tar.gz" | tar xz mcp-publisher
          sudo mv mcp-publisher /usr/local/bin/

      - name: Stamp release version into server.json
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          jq --arg v "$VERSION" \
            '.version = $v | .packages[0].identifier = "docker.io/massdrivercloud/mcp-server:" + $v' \
            server.json > server.json.tmp && mv server.json.tmp server.json

      - name: Log in to the MCP Registry (DNS auth for massdriver.cloud)
        run: mcp-publisher login dns --domain massdriver.cloud --private-key "${{ secrets.MCP_REGISTRY_PRIVATE_KEY }}"

      - name: Publish
        run: mcp-publisher publish
