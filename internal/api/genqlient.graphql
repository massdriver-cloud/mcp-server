}

# Deployments

query listDeployments($organizationId: ID!, $filter: DeploymentsFilter, $cursor: Cursor) {
  deployments(organizationId: $organizationId, filter: $filter, cursor: $cursor) {
    cursor {
      next
      previous
    }
    items {
      id
      status
      action
      version
      message
      createdAt
      updatedAt
      lastTransitionedAt
      elapsedTime
      deployedBy
      instance {
        id
        name
        environment {
          id
          name
          project {
            id
            name
          }
        }
      }
    }
  }
}

query getDeployment($organizationId: ID!, $id: ID!) {
