# Instances

query listInstances($organizationId: ID!, $filter: InstancesFilter, $cursor: Cursor) {
  instances(organizationId: $organizationId, filter: $filter, cursor: $cursor) {
    cursor {
      next
      previous
    }
    items {
      id
      name
      status
      version
      releaseStrategy
      createdAt
      updatedAt
      environment {
        id
        name
        project {
          id
          name
        }
      }
      release {
        id
        name
        version
      }
    }
  }
}

